<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="./images/favicon-32x32.png"
  >

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="./css/style.css"
  >

  <title>Frontend Mentor | Todo app</title>
</head>

<body>
  

  <main class="todo-app">

    <header class="header">

      <h1>TODO</h1>

      <button
        class="theme-toggle"
        type="button"
        aria-label="Toggle theme"
      >
        <img
          src="./images/icon-sun.svg"
          alt="Theme icon"
        >
      </button>

    </header>

    <form class="todo-form">

      <div class="circle"></div>

      <input
        id="todo-input"
        type="text"
        placeholder="Create a new todo..."
        autocomplete="off"
        aria-label="Create a new todo"
      >

    </form>

    <section class="todo-list">

      <div
        id="todos-container"
        aria-live="polite"
      >
        <!-- Todos generated by JavaScript -->
      </div>

      <footer class="todo-footer">

        <p id="items-left">
          0 items left
        </p>

        <div class="filters">

         

<button
  type="button"
  class="filter-btn active"
  data-filter="all"
>
  All
</button>

<button
  type="button"
  class="filter-btn"
  data-filter="active"
>
  Active
</button>

<button
  type="button"
  class="filter-btn"
  data-filter="completed"
>
  Completed
</button>

        </div>

        <button
          type="button"
          class="clear-btn"
        >
          Clear Completed
        </button>

      </footer>

    </section>

    <p class="drag-text">
      Drag and drop to reorder list
    </p>

  </main>

  <script src="./js/app.js"></script>

</body>
</html>
